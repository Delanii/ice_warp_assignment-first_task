image: mcr.microsoft.com/playwright/python:v1.54.0-jammy

stages:
  - test

variables:
  WEBSITE_URL: "https://iwqa01.onice.io"

cache:
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt
  - mkdir -p reports

ui_tests:
  stage: test

  script:
    - pytest tests \
        --html=reports/report.html \
        --self-contained-html \
        --junitxml=reports/report.xml

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/
    reports:
      junit: reports/report.xml